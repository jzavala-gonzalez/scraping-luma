name: Regions without service

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/6 * * * *'

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
      # This step installs Deno, which is a new Javascript runtime that improves on Node. Can be used for an optional postprocessing step
      - name: Setup deno
        uses: denoland/setup-deno@main
        with:
          deno-version: v1.10.x
      # Check out the repository so it can read the files inside of it and do other operations
      - name: Check out repo
        uses: actions/checkout@v2
      # The Flat Action step. We fetch the data in the http_url and save it as downloaded_filename
      - name: Fetch regions service data
        uses: githubocto/flat@v3
        with:
          http_url: https://api.miluma.lumapr.com/miluma-outage-api/outage/regionsWithoutService # THE URL YOU WISH TO FETCH GOES HERE
          downloaded_filename: regionsWithoutService.json # The http_url gets saved and renamed in our repository. Example: data.json, data.csv, image.png
          postprocess: prettyprint_json.ts
      # Install python requirements
      - name: Pip install requirements
        run: |
          python -m pip install -r requirements.txt
      - name: Save historical data
        run: |-
          python ./build_regionsService.py
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add regionsWithoutService_historical.csv
          timestamp=$(date -u)
          git commit -m "Update regionsWithoutService_historical.csv $(timestamp)" || exit 0
          git push